# Standard-first tmux configuration.
# - Keeps the default prefix and stock keymap.
# - Adds only low-risk quality-of-life options and light status styling.
# - Loads optional visual-only overrides from ~/.config/tmux/theme.conf when present.

if-shell 'infocmp tmux-256color >/dev/null 2>&1' 'set -g default-terminal "tmux-256color"' 'set -g default-terminal "screen-256color"'
set -g history-limit 100000
set -g mouse on
set -g renumber-windows on
set -g set-clipboard on
set -s escape-time 10
set -g focus-events on
set -g status on
setw -g automatic-rename off
set -g set-titles on
set -g set-titles-string '#S #I:#W (#h)'
set -as terminal-overrides ",tmux-256color:Tc,xterm-256color:Tc,wezterm:Tc,xterm-kitty:Tc,alacritty:Tc"
set -as terminal-overrides ',*:Smol=\E[53m'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 32
set -g status-right-length 64
set -g status-left " #S "
set -g status-right " %Y-%m-%d %H:%M "
set -g status-style fg=colour252,bg=colour236
set -g message-style fg=colour231,bg=colour31
set -g message-command-style fg=colour231,bg=colour31
set -g pane-border-style fg=colour239
set -g pane-active-border-style fg=colour39
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold]#I:#W#[default] "
setw -g window-status-style fg=colour250,bg=colour236
setw -g window-status-current-style fg=colour231,bg=colour31
setw -g window-status-activity-style fg=colour229,bg=colour236

# Session persistence (tmux-resurrect) — loaded if cloned, silently skipped otherwise.
run-shell '[ -f ~/.local/share/tmux/plugins/tmux-resurrect/resurrect.tmux ] && ~/.local/share/tmux/plugins/tmux-resurrect/resurrect.tmux || true'

if-shell '[ -f ~/.config/tmux/theme.conf ]' 'source-file ~/.config/tmux/theme.conf'
