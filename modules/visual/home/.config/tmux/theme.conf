# Optional tmux theme overrides.
# Visual only: colors and status presentation. No keymap or workflow changes.

set -g status-style fg=colour255,bg=colour235
set -g status-left "#[fg=colour255,bg=colour61,bold] #S #[default]"
set -g status-right "#[fg=colour109,bg=colour235] %Y-%m-%d #[fg=colour255,bg=colour24,bold] %H:%M #[default]"
set -g message-style fg=colour255,bg=colour61
set -g message-command-style fg=colour255,bg=colour24
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour81
setw -g window-status-style fg=colour248,bg=colour235
setw -g window-status-current-style fg=colour255,bg=colour24,bold
setw -g window-status-activity-style fg=colour229,bg=colour235,bold
setw -g window-status-separator ""

set -g status-left "#[fg=colour255,bg=colour61,bold] #S #[fg=colour61,bg=colour235,nobold]#[fg=colour109,bg=colour235] #h "
set -g status-right-length 120
set -g status-right "#{?client_prefix,#[fg=colour16,bg=colour226,bold] PREFIX #[default],}#(sh ~/.config/tmux/statusbar.sh cpu) #(sh ~/.config/tmux/statusbar.sh ram) #[fg=colour109,bg=colour235] %Y-%m-%d #[fg=colour255,bg=colour24,bold] %H:%M #[default]"
setw -g window-status-format " #[fg=colour81,bg=colour235]#I#[fg=colour248] #W#{?window_zoomed_flag, #[fg=colour214]Z,}#{?window_marked_flag, #[fg=colour149]M,} "
setw -g window-status-current-format "#[fg=colour16,bg=colour81,bold] #I #[fg=colour255,bg=colour24,bold] #W#{?pane_synchronized, #[fg=colour220,bg=colour24]SYNC,} #[default]"
