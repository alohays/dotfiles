# Optional tmux theme overrides.
# Visual only: colors and status presentation. No keymap or workflow changes.

set -g status-style fg=colour255,bg=colour235
set -g status-left "#[fg=colour255,bg=colour61,bold] #S #[default]"
set -g status-right "#[fg=colour109,bg=colour235] %Y-%m-%d #[fg=colour255,bg=colour24,bold] %H:%M #[default]"
set -g message-style fg=colour255,bg=colour61
set -g message-command-style fg=colour255,bg=colour24
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour81
setw -g window-status-style fg=colour248,bg=colour235
setw -g window-status-current-style fg=colour255,bg=colour24,bold
setw -g window-status-activity-style fg=colour229,bg=colour235,bold
